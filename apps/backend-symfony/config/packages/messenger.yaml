framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: sigi_async
                    group: sigi_workers
                    consumer: '%env(MESSENGER_CONSUMER_NAME)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 30000
            failed: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'
            sync: 'sync://'

        routing:
            App\Message\Integration\Chatwoot\ProcessChatwootEventMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'