services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sigi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sigi_sd}
      POSTGRES_USER: ${POSTGRES_USER:-sigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigi_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sigi-network

  redis:
    image: redis:7-alpine
    container_name: sigi-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sigi-network

  traefik:
    image: traefik:latest
    container_name: sigi-traefik
    environment:
      DOCKER_API_VERSION: "1.54"
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "18080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sigi-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: sigi-portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.sigi.localhost`)
      - traefik.http.routers.portainer.entrypoints=web
      - traefik.http.services.portainer.loadbalancer.server.port=9000
    networks:
      - sigi-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sigi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sigi.dev.br}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-sigi_pgadmin_dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.sigi.localhost`)
      - traefik.http.routers.pgadmin.entrypoints=web
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
    networks:
      - sigi-network

  symfony-admin:
    build:
      context: ./apps/backend-symfony
    container_name: sigi-symfony-admin
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-troque-este-segredo}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sigi:sigi_dev_password@postgres:5432/sigi_sd?serverVersion=16&charset=utf8}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CHATWOOT_INTERNAL_BASE_URL: ${CHATWOOT_INTERNAL_BASE_URL:-http://chatwoot:3000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      SIGI_CHATWOOT_URL: ${SIGI_CHATWOOT_URL:-http://chat.sigi.localhost}
      SIGI_BOTPRESS_URL: ${SIGI_BOTPRESS_URL:-http://bot.sigi.localhost}
      SIGI_TYPEBOT_URL: ${SIGI_TYPEBOT_URL:-}
      SIGI_PORTAINER_URL: ${SIGI_PORTAINER_URL:-http://portainer.sigi.localhost}
      SIGI_BI_URL: ${SIGI_BI_URL:-}
      SIGI_DOCS_URL: ${SIGI_DOCS_URL:-}
    depends_on:
      - postgres
      - redis
    labels:
      - traefik.enable=true
      - traefik.http.routers.symfony-admin.rule=Host(`admin.sigi.localhost`)
      - traefik.http.routers.symfony-admin.entrypoints=web
      - traefik.http.services.symfony-admin.loadbalancer.server.port=80
    networks:
      - sigi-network

  chatwoot:
    image: chatwoot/chatwoot:latest
    container_name: sigi-chatwoot
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-troque-este-segredo-chatwoot}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://chat.sigi.localhost}
      INSTALLATION_ENV: docker
      RAILS_LOG_TO_STDOUT: "true"
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DB:-chatwoot_production}
      POSTGRES_USERNAME: ${POSTGRES_USER:-sigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigi_dev_password}
      REDIS_URL: redis://redis:6379
    command: sh -c "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    volumes:
      - chatwoot_data:/app/storage
    depends_on:
      - postgres
      - redis
    labels:
      - traefik.enable=true
      - traefik.http.routers.chatwoot.rule=Host(`chat.sigi.localhost`)
      - traefik.http.routers.chatwoot.entrypoints=web
      - traefik.http.services.chatwoot.loadbalancer.server.port=3000
    networks:
      - sigi-network

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    container_name: sigi-chatwoot-worker
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-troque-este-segredo-chatwoot}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://chat.sigi.localhost}
      INSTALLATION_ENV: docker
      RAILS_LOG_TO_STDOUT: "true"
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DB:-chatwoot_production}
      POSTGRES_USERNAME: ${POSTGRES_USER:-sigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigi_dev_password}
      REDIS_URL: redis://redis:6379
    command: sh -c "bundle exec sidekiq -C config/sidekiq.yml"
    volumes:
      - chatwoot_data:/app/storage
    depends_on:
      - postgres
      - redis
      - chatwoot
    networks:
      - sigi-network

  botpress:
    image: botpress/server:latest
    container_name: sigi-botpress
    volumes:
      - botpress_data:/botpress/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.botpress.rule=Host(`bot.sigi.localhost`)
      - traefik.http.routers.botpress.entrypoints=web
      - traefik.http.services.botpress.loadbalancer.server.port=3000
    networks:
      - sigi-network

  ollama:
    image: ollama/ollama:latest
    container_name: sigi-ollama
    volumes:
      - ollama_data:/root/.ollama
    labels:
      - traefik.enable=true
      - traefik.http.routers.ollama.rule=Host(`ia.sigi.localhost`)
      - traefik.http.routers.ollama.entrypoints=web
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    networks:
      - sigi-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sigi-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    labels:
      - traefik.enable=true
      - traefik.http.routers.qdrant.rule=Host(`qdrant.sigi.localhost`)
      - traefik.http.routers.qdrant.entrypoints=web
      - traefik.http.services.qdrant.loadbalancer.server.port=6333
    networks:
      - sigi-network

networks:
  sigi-network:
    name: sigi-network

volumes:
  postgres_data:
  redis_data:
  chatwoot_data:
  botpress_data:
  qdrant_data:
  ollama_data:
  portainer_data:
  pgadmin_data:
